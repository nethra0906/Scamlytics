<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scamlytics - Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06090e;
      color: #f8fafc;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 100% 4px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; color: #ff9f0a; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
    p  { color: #94a3b8; font-size: 0.875rem; line-height: 1.6; max-width: 400px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      margin-bottom: 1.5rem;
      background: rgba(255,159,10,0.15);
      border: 1px solid rgba(255,159,10,0.2);
      border-radius: 9999px;
      font-size: 0.75rem;
      color: #ff9f0a;
    }
    .dot {
      width: 8px; height: 8px;
      background: #ff3b30;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    button {
      margin-top: 2rem;
      padding: 0.625rem 1.5rem;
      background: #ff9f0a;
      color: #06090e;
      border: none;
      border-radius: 0.375rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #ffb340; }
  </style>
</head>
<body>
  <div class="badge"><span class="dot"></span> NETWORK OFFLINE</div>
  <div class="icon">📡</div>
  <h1>Connection Lost</h1>
  <p>
    Scamlytics requires an active connection to the intelligence backend.<br/>
    Please check your network and try again.
  </p>
  <button onclick="window.location.reload()">RETRY CONNECTION</button>
</body>
</html>
